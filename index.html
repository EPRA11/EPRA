/* Noise overlay */
.bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(124,92,191,0.15) 0%, transparent 70%);
}

/* Main container */
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  animation: fadeIn 0.8s ease both;
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(16px); }
  to { opacity:1; transform: translateY(0); }
}

/* Avatar */
.avatar-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 14px;
  animation: fadeIn 0.6s 0.1s ease both;
}

.avatar-wrap {
  position: relative;
  width: 96px;
  height: 96px;
  margin-bottom: 12px;
}

.avatar {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1.5px solid rgba(124,92,191,0.5);
  animation: spin 8s linear infinite;
}

.avatar-ring::after {
  content: '';
  position: absolute;
  top: -1px; left: 50%;
  width: 7px; height: 7px;
  background: #7c5cbf;
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 10px #7c5cbf, 0 0 4px #fff;
}

@keyframes spin { to { transform: rotate(360deg); } }

.status-dot {
  position: absolute;
  bottom: 4px; left: 4px;
  width: 16px; height: 16px;
  background: #3ba55c;
  border-radius: 50%;
  border: 2.5px solid #0d0d0d;
  box-shadow: 0 0 8px rgba(59,165,92,0.6);
}

/* Name */
.name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.name .mvp-badge {
  font-size: 11px;
  font-family: 'Tajawal', sans-serif;
  font-weight: 900;
  padding: 2px 10px;
  border-radius: 20px;
  background: rgba(124,92,191,0.25);
  border: 1px solid rgba(124,92,191,0.5);
  color: #b09fe0;
  letter-spacing: 2px;
}

.username {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  margin-top: 5px;
  letter-spacing: 0.5px;
  text-align: center;
}

/* Tags */
.tags {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.5px;
  backdrop-filter: blur(8px);
}

/* Divider */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  margin: 18px 0;
}

/* Links */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
  animation: fadeIn 0.6s 0.3s ease both;
}

.link-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 12px 16px;
  text-decoration: none;
  color: #fff;
  transition: all 0.25s ease;
  cursor: pointer;
  backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
}

.link-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
}

.link-btn:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.09);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.link-btn:hover::before { opacity: 1; }

.link-btn.instagram::before { background: linear-gradient(135deg, rgba(253,88,73,0.08), rgba(214,36,159,0.06)); }
.link-btn.instagram:hover { border-color: rgba(214,36,159,0.3); }

.link-btn.spotify-lnk::before { background: linear-gradient(135deg, rgba(30,215,96,0.08), transparent); }
.link-btn.spotify-lnk:hover { border-color: rgba(30,215,96,0.3); }

.link-btn.twitch::before { background: linear-gradient(135deg, rgba(145,71,255,0.1), transparent); }
.link-btn.twitch:hover { border-color: rgba(145,71,255,0.3); }

.link-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.link-icon svg { width: 19px; height: 19px; fill: #fff; }
.link-icon.sp svg { fill: #000; }

.instagram .link-icon { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); box-shadow: 0 3px 10px rgba(214,36,159,0.3); }
.spotify-lnk .link-icon { background: #1ed760; box-shadow: 0 3px 10px rgba(30,215,96,0.3); }
.twitch .link-icon { background: #9147ff; box-shadow: 0 3px 10px rgba(145,71,255,0.3); }

.link-text { flex: 1; text-align: right; }
.link-name { font-size: 14px; font-weight: 700; color: #fff; display: block; }
.link-handle { font-size: 11px; color: rgba(255,255,255,0.4); display: block; margin-top: 1px; }
.link-arrow { color: rgba(255,255,255,0.25); font-size: 14px; transition: transform 0.3s; }
.link-btn:hover .link-arrow { transform: translateX(-3px); color: rgba(255,255,255,0.5); }

/* Spotify now playing */
.now-playing {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(30,215,96,0.07);
  border: 1px solid rgba(30,215,96,0.15);
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 8px;
  backdrop-filter: blur(12px);
  cursor: pointer;
  transition: all 0.25s ease;
  animation: fadeIn 0.6s 0.2s ease both;
  text-decoration: none;
}

.now-playing:hover {
  background: rgba(30,215,96,0.12);
  border-color: rgba(30,215,96,0.3);
  transform: translateY(-2px);
}

.sp-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: #1ed760;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(30,215,96,0.35);
}

.sp-icon svg { width: 19px; height: 19px; fill: #000; }

.sp-info { flex: 1; text-align: right; }
.sp-label { font-size: 10px; color: #1ed760; letter-spacing: 1.5px; font-weight: 700; text-transform: uppercase; }
.sp-track { font-size: 13px; font-weight: 700; color: #fff; }
.sp-artist { font-size: 11px; color: rgba(255,255,255,0.4); }

.sp-bars {
  display: flex; align-items: flex-end; gap: 2px; height: 18px;
}
.bar {
  width: 3px; background: #1ed760; border-radius: 2px;
  animation: barAnim 1s ease-in-out infinite alternate;
}
.bar:nth-child(1){ animation-delay:0s; }
.bar:nth-child(2){ animation-delay:0.2s; }
.bar:nth-child(3){ animation-delay:0.4s; }
.bar:nth-child(4){ animation-delay:0.15s; }

@keyframes barAnim { from{height:3px} to{height:18px} }

/* Footer */
.footer {
  margin-top: 18px;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  text-align: center;
  animation: fadeIn 0.6s 0.4s ease both;
  letter-spacing: 0.5px;
}

/* Music button */
#music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(12,12,22,0.8);
  border: 1px solid rgba(124,92,191,0.35);
  backdrop-filter: blur(16px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 999;
  font-size: 18px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

#music-btn:hover { transform: scale(1.1); }

/* Splash Screen */
#splash {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}

#splash.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.splash-bg {
  position: absolute;
  inset: 0;
  background-image: var(--avatar-bg);
  background-size: cover;
  background-position: center;
  filter: blur(60px) brightness(0.15) saturate(1.5);
  transform: scale(1.1);
}

.splash-text {
  position: relative;
  z-index: 1;
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  letter-spacing: 4px;
  text-transform: lowercase;
  animation: pulse 2s ease-in-out infinite;
}

.splash-text::after {
  content: '';
  display: block;
  width: 40px;
  height: 1px;
  background: rgba(255,255,255,0.3);
  margin: 12px auto 0;
  animation: expand 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

@keyframes expand {
  0%, 100% { width: 20px; opacity: 0.3; }
  50% { width: 60px; opacity: 0.8; }
}

</style>
</head>

<div id="yt-player" style="display:none;"></div>

<div id="music-btn" onclick="toggleMusic()" title="تشغيل/إيقاف الموسيقى">🎵</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  var player, isPlaying = false, playerReady = false;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
      height: '1', width: '1',
      videoId: 'tz5170gneDE',
      playerVars: { autoplay: 0, loop: 1, playlist: 'tz5170gneDE', controls: 0, disablekb: 1, fs: 0, iv_load_policy: 3, modestbranding: 1, mute: 1 },
      events: {
        onReady: function(e) {
          playerReady = true;
          e.target.setVolume(45);
          e.target.playVideo();
          // Music will start via splash screen click
        },
        onStateChange: function(e) {
          if (e.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
          } else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
            isPlaying = false;
          }
          updateBtn();
        }
      }
    });
  }

  function updateBtn() {
    var btn = document.getElementById('music-btn');
    if (isPlaying) {
      btn.innerHTML = '🔊';
      btn.style.borderColor = 'rgba(124,92,191,0.7)';
      btn.style.boxShadow = '0 4px 20px rgba(124,92,191,0.4)';
    } else {
      btn.innerHTML = '🎵';
      btn.style.borderColor = 'rgba(124,92,191,0.35)';
      btn.style.boxShadow = '0 4px 16px rgba(0,0,0,0.4)';
    }
  }

  function enterSite() {
    // Hide splash
    document.getElementById('splash').classList.add('hide');
    // Start music
    if (playerReady) {
      player.unMute();
      player.setVolume(45);
      player.playVideo();
    } else {
      // If player not ready yet, wait for it
      var interval = setInterval(function() {
        if (playerReady) {
          player.unMute();
          player.setVolume(45);
          player.playVideo();
          clearInterval(interval);
        }
      }, 200);
    }
  }

  function toggleMusic() {
    if (!playerReady) return;
    isPlaying ? player.pauseVideo() : player.playVideo();
  }
</script>
