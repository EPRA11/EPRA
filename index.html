<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPRA - سجل الآن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --accent: #7c5cbf;
  --accent2: #4e9af1;
  --bg: #080810;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #e8e8f0;
  --muted: rgba(255,255,255,0.4);
}
body {
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Tajawal', sans-serif;
  color: var(--text);
  padding: 20px;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,92,191,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(78,154,241,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.card {
  width: 100%;
  max-width: 420px;
  background: rgba(12,12,22,0.8);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 32px;
  backdrop-filter: blur(30px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  animation: up 0.6s cubic-bezier(.16,1,.3,1) both;
  position: relative;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124,92,191,0.6), transparent);
}
@keyframes up { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
.logo {
  text-align: center;
  margin-bottom: 28px;
}
.logo h1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #b09fe0, #4e9af1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}
.logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }

.tabs {
  display: flex;
  gap: 4px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
}
.tab {
  flex: 1;
  padding: 9px;
  border-radius: 9px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active {
  background: rgba(124,92,191,0.25);
  color: #fff;
  border: 1px solid rgba(124,92,191,0.4);
}

.form { display: flex; flex-direction: column; gap: 14px; }
.form.hidden { display: none; }

label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; letter-spacing: 0.5px; }
input {
  width: 100%;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  text-align: right;
}
input:focus { border-color: rgba(124,92,191,0.5); }
input::placeholder { color: rgba(255,255,255,0.2); }

.btn {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #7c5cbf, #4e9af1);
  color: #fff;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}
.btn:hover { opacity: 0.9; transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.msg {
  font-size: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  text-align: center;
  display: none;
}
.msg.error { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff8080; display: block; }
.msg.success { background: rgba(30,215,96,0.1); border: 1px solid rgba(30,215,96,0.3); color: #1ed760; display: block; }

.divider { height: 1px; background: var(--border); margin: 4px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>EPRA</h1>
    <p>ابني صفحتك الشخصية</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
    <button class="tab" onclick="switchTab('register')">حساب جديد</button>
  </div>

  <!-- Login -->
  <div class="form" id="loginForm">
    <div>
      <label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="example@email.com">
    </div>
    <div>
      <label>كلمة المرور</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <div class="msg" id="loginMsg"></div>
    <button class="btn" onclick="login()">دخول</button>
  </div>

  <!-- Register -->
  <div class="form hidden" id="registerForm">
    <div>
      <label>اليوزرنيم (رابطك الشخصي)</label>
      <input type="text" id="regUsername" placeholder="مثال: epra" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')">
    </div>
    <div>
      <label>البريد الإلكتروني</label>
      <input type="email" id="regEmail" placeholder="example@email.com">
    </div>
    <div>
      <label>كلمة المرور</label>
      <input type="password" id="regPass" placeholder="••••••••">
    </div>
    <div class="msg" id="registerMsg"></div>
    <button class="btn" onclick="register()">إنشاء الحساب</button>
  </div>
</div>

<script>
// ====== SUPABASE CONFIG ======
// غير هذين السطرين ببيانات مشروعك من Supabase
const SUPABASE_URL = 'https://kgwdjtncgbzphqjweqzt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtnd2RqdG5jZ2J6cGhxandlcXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDEyMTQsImV4cCI6MjA4OTU3NzIxNH0.e04LgfZ2z6vCy1xvhXtN9vlrYhmhvXKqVdbGm6eUn7I';
// ============================

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
db.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'edit.html';
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
  document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'msg ' + type;
}

async function register() {
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;

  if (!username || !email || !pass) return showMsg('registerMsg', 'اكمل جميع الحقول', 'error');
  if (username.length < 3) return showMsg('registerMsg', 'اليوزرنيم يجب أن يكون 3 أحرف على الأقل', 'error');
  if (pass.length < 6) return showMsg('registerMsg', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');

  // Check username taken
  const { data: existing } = await db.from('profiles').select('username').eq('username', username).single();
  if (existing) return showMsg('registerMsg', 'هذا اليوزرنيم محجوز، جرب غيره', 'error');

  const btn = document.querySelector('#registerForm .btn');
  btn.disabled = true; btn.textContent = 'جاري الإنشاء...';

  const { data, error } = await db.auth.signUp({ email, password: pass });
  if (error) { showMsg('registerMsg', error.message, 'error'); btn.disabled=false; btn.textContent='إنشاء الحساب'; return; }

  // Create profile
  await db.from('profiles').insert({
    id: data.user.id,
    username,
    display_name: username,
    bio: '',
    avatar_url: '',
    youtube_id: '',
    links: []
  });

  showMsg('registerMsg', '✅ تم إنشاء الحساب! جاري التحويل...', 'success');
  setTimeout(() => window.location.href = 'edit.html', 1500);
}

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) return showMsg('loginMsg', 'اكمل جميع الحقول', 'error');

  const btn = document.querySelector('#loginForm .btn');
  btn.disabled = true; btn.textContent = 'جاري الدخول...';

  const { error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) { showMsg('loginMsg', 'بيانات غير صحيحة', 'error'); btn.disabled=false; btn.textContent='دخول'; return; }

  window.location.href = 'edit.html';
}
</script>
</body>
</html>
