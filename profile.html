<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPRA</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height: 100vh;
  background: #0d0d0d;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Tajawal', sans-serif;
  color: #fff;
  overflow: hidden;
  position: relative;
}
.bg-layer {
  position: fixed; inset: 0;
  background-size: cover;
  background-position: center;
  filter: blur(50px) brightness(0.2) saturate(1.5);
  transform: scale(1.1);
  z-index: 0;
  transition: background-image 0.5s;
}
.container {
  position: relative; z-index: 1;
  width: 100%; max-width: 460px;
  padding: 20px;
  display: flex; flex-direction: column; align-items: center;
  animation: fadeIn 0.8s ease both;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

.avatar-wrap { position:relative; width:96px; height:96px; margin-bottom:12px; }
.avatar {
  width:96px; height:96px; border-radius:50%;
  object-fit:cover; border:2px solid rgba(255,255,255,0.15);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  background: rgba(255,255,255,0.05);
}
.avatar-ring {
  position:absolute; inset:-4px; border-radius:50%;
  border:1.5px solid rgba(124,92,191,0.5);
  animation:spin 8s linear infinite;
}
.avatar-ring::after {
  content:''; position:absolute; top:-1px; left:50%;
  width:7px; height:7px; background:#7c5cbf; border-radius:50%;
  transform:translateX(-50%); box-shadow:0 0 10px #7c5cbf;
}
@keyframes spin { to{transform:rotate(360deg)} }
.status-dot {
  position:absolute; bottom:4px; left:4px;
  width:16px; height:16px; background:#3ba55c;
  border-radius:50%; border:2.5px solid #0d0d0d;
  box-shadow:0 0 8px rgba(59,165,92,0.6);
}

.name {
  font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700;
  text-align:center; display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center;
}
.username { font-size:13px; color:rgba(255,255,255,0.4); margin-top:5px; text-align:center; }
.bio { font-size:13px; color:rgba(255,255,255,0.55); margin-top:10px; text-align:center; max-width:320px; line-height:1.6; }

.divider { width:100%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent); margin:18px 0; }

.links { width:100%; display:flex; flex-direction:column; gap:8px; }
.link-btn {
  display:flex; align-items:center; gap:12px;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
  border-radius:14px; padding:13px 16px;
  text-decoration:none; color:#fff;
  transition:all 0.25s ease; cursor:pointer;
  backdrop-filter:blur(12px);
}
.link-btn:hover { transform:translateY(-2px); background:rgba(255,255,255,0.09); border-color:rgba(255,255,255,0.15); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.link-name { flex:1; font-size:14px; font-weight:700; text-align:right; }
.link-arrow { color:rgba(255,255,255,0.25); font-size:14px; transition:transform 0.3s; }
.link-btn:hover .link-arrow { transform:translateX(-3px); color:rgba(255,255,255,0.5); }

.footer { margin-top:22px; font-size:11px; color:rgba(255,255,255,0.2); letter-spacing:0.5px; }

/* Splash */
#splash {
  position:fixed; inset:0; z-index:9999;
  background:#000; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:opacity 0.8s ease, visibility 0.8s ease;
}
#splash.hide { opacity:0; visibility:hidden; pointer-events:none; }
.splash-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:blur(60px) brightness(0.15); transform:scale(1.1); }
.splash-text {
  position:relative; z-index:1;
  font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:600;
  color:rgba(255,255,255,0.7); letter-spacing:4px; text-align:center;
  animation:pulse 2s ease-in-out infinite;
}
.splash-text::after {
  content:''; display:block; width:40px; height:1px;
  background:rgba(255,255,255,0.3); margin:12px auto 0;
  animation:expand 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
@keyframes expand { 0%,100%{width:20px;opacity:0.3} 50%{width:60px;opacity:0.8} }

/* Music btn */
#music-btn {
  position:fixed; bottom:20px; left:20px;
  width:44px; height:44px; border-radius:50%;
  background:rgba(12,12,22,0.8); border:1px solid rgba(124,92,191,0.35);
  backdrop-filter:blur(16px); display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:999; font-size:18px; transition:all 0.3s ease;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
#music-btn:hover { transform:scale(1.1); }

.not-found { text-align:center; color:rgba(255,255,255,0.4); }
.not-found h2 { font-size:24px; margin-bottom:8px; }
</style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>

<div id="splash" onclick="enterSite()">
  <div class="splash-bg" id="splashBg"></div>
  <div class="splash-text">click to enter...</div>
</div>

<div class="container" id="mainContent" style="display:none">
  <div class="avatar-wrap">
    <img class="avatar" id="avatar" src="">
    <div class="avatar-ring"></div>
    <div class="status-dot"></div>
  </div>
  <div class="name" id="displayName"></div>
  <div class="username" id="username"></div>
  <div class="bio" id="bio"></div>
  <div class="divider"></div>
  <div class="links" id="links"></div>
  <div class="footer" id="footer"></div>
</div>

<div id="notFound" style="display:none" class="not-found">
  <h2>404</h2>
  <p>هذا الحساب غير موجود</p>
</div>

<div id="yt-player" style="display:none;"></div>
<div id="music-btn" onclick="toggleMusic()" style="display:none;">🎵</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const SUPABASE_URL = 'https://kgwdjtncgbzphqjweqzt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtnd2RqdG5jZ2J6cGhxandlcXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDEyMTQsImV4cCI6MjA4OTU3NzIxNH0.e04LgfZ2z6vCy1xvhXtN9vlrYhmhvXKqVdbGm6eUn7I';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

var player, isPlaying=false, playerReady=false, youtubeId='';

async function loadProfile() {
  const params = new URLSearchParams(location.search);
  const u = params.get('u');
  if (!u) { showNotFound(); return; }

  const { data } = await db.from('profiles').select('*').eq('username', u).single();
  if (!data) { showNotFound(); return; }

  document.title = data.display_name || data.username;

  // BG
  if (data.avatar_url) {
    document.getElementById('bgLayer').style.backgroundImage = `url('${data.avatar_url}')`;
    document.getElementById('splashBg').style.backgroundImage = `url('${data.avatar_url}')`;
  }

  // Avatar
  const avatarEl = document.getElementById('avatar');
  avatarEl.src = data.avatar_url || 'https://via.placeholder.com/96';

  // Info
  document.getElementById('displayName').textContent = data.display_name || data.username;
  document.getElementById('username').textContent = `@${data.username}`;
  document.getElementById('bio').textContent = data.bio || '';
  document.getElementById('footer').textContent = `${data.display_name || data.username} © 2025`;

  // Links
  const linksContainer = document.getElementById('links');
  const links = data.links || [];
  links.forEach(l => {
    const a = document.createElement('a');
    a.className = 'link-btn';
    a.href = l.url; a.target = '_blank';
    a.innerHTML = `<div class="link-name">${l.label}</div><span class="link-arrow">↗</span>`;
    linksContainer.appendChild(a);
  });

  document.getElementById('mainContent').style.display = 'flex';

  // Music
  youtubeId = data.youtube_id || '';
  if (youtubeId) document.getElementById('music-btn').style.display = 'flex';
}

function showNotFound() {
  document.getElementById('splash').classList.add('hide');
  document.getElementById('notFound').style.display = 'block';
}

function enterSite() {
  document.getElementById('splash').classList.add('hide');
  if (youtubeId && playerReady) {
    player.unMute(); player.setVolume(45); player.playVideo();
  } else if (youtubeId) {
    var iv = setInterval(() => {
      if (playerReady) { player.unMute(); player.setVolume(45); player.playVideo(); clearInterval(iv); }
    }, 200);
  }
}

function onYouTubeIframeAPIReady() {
  if (!youtubeId) return;
  player = new YT.Player('yt-player', {
    height:'1', width:'1',
    videoId: youtubeId,
    playerVars: { autoplay:0, loop:1, playlist:youtubeId, controls:0, disablekb:1, fs:0, iv_load_policy:3, modestbranding:1 },
    events: {
      onReady: e => { playerReady=true; e.target.setVolume(45); },
      onStateChange: e => {
        var btn = document.getElementById('music-btn');
        if (e.data === YT.PlayerState.PLAYING) {
          isPlaying=true; btn.innerHTML='🔊';
          btn.style.borderColor='rgba(124,92,191,0.7)';
          btn.style.boxShadow='0 4px 20px rgba(124,92,191,0.4)';
        } else {
          isPlaying=false; btn.innerHTML='🎵';
          btn.style.borderColor='rgba(124,92,191,0.35)';
          btn.style.boxShadow='0 4px 16px rgba(0,0,0,0.4)';
        }
      }
    }
  });
}

function toggleMusic() {
  if (!playerReady) return;
  isPlaying ? player.pauseVideo() : player.playVideo();
}

loadProfile();
</script>
</body>
</html>
